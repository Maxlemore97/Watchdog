name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same ref so
# we don't burn CI minutes on stale revisions.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -count=1 ./...

  vet:
    name: go vet + staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
        continue-on-error: true

  goreleaser-check:
    name: goreleaser config valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

  shellcheck:
    name: shellcheck install + hook scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        # -x follows `source` directives; -P sets the search path for
        # those directives. With both, hooks/*.sh can `source
        # lib/resolve.sh` and shellcheck resolves it to
        # hooks/lib/resolve.sh regardless of CWD.
        run: shellcheck -x -P hooks install.sh hooks/*.sh

  fuzz:
    name: parser fuzz (smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: FuzzTokenize
        run: go test -run=^$ -fuzz=FuzzTokenize -fuzztime=60s ./internal/parsers
      - name: FuzzSplitOnOperators
        run: go test -run=^$ -fuzz=FuzzSplitOnOperators -fuzztime=60s ./internal/parsers
