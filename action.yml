name: Watchdog
description: Audit Claude plugin/skill/command/hook changes in a pull request.
author: Maxlemore97
branding:
  icon: shield
  color: blue
inputs:
  fail-on:
    description: "Verdict severity that fails the job: deny, ask, or never."
    required: false
    default: deny
  model:
    description: LLM model used by the analyzer (default per provider).
    required: false
    default: ""
  base-ref:
    description: Base ref for the diff (default = pull_request base, else `main`).
    required: false
    default: ""
  version:
    description: Watchdog release tag to install (default = the action ref, else `latest`).
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install Watchdog
      shell: bash
      env:
        WATCHDOG_VERSION: ${{ inputs.version || github.action_ref }}
        WATCHDOG_INSTALL_DIR: ${{ github.workspace }}/.watchdog/bin
      run: |
        # Skip the API call when an explicit tag was supplied; default
        # to "latest" otherwise.
        if [ -z "${WATCHDOG_VERSION}" ] || [ "${WATCHDOG_VERSION}" = "main" ]; then
          WATCHDOG_VERSION="latest"
        fi
        curl -fsSL https://raw.githubusercontent.com/Maxlemore97/Watchdog/main/install.sh | sh
        echo "${WATCHDOG_INSTALL_DIR}" >> "$GITHUB_PATH"
    - name: Fetch base ref
      shell: bash
      run: |
        base="${{ inputs.base-ref }}"
        base="${base:-${GITHUB_BASE_REF:-main}}"
        git fetch --no-tags --depth=50 origin "$base":"refs/remotes/origin/$base"
    - name: Run Watchdog
      shell: bash
      env:
        WATCHDOG_ACTION_FAIL_ON: ${{ inputs.fail-on }}
        WATCHDOG_LLM_MODEL: ${{ inputs.model }}
        WATCHDOG_BASE_REF: ${{ inputs.base-ref }}
      run: watchdog-action
